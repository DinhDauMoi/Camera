<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Vintage Camera - Retro Cam Simulation</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Outer Phone Mockup (shows on desktop, fluid on mobile) -->
    <div class="phone-mockup">
      <div class="phone-screen">
        
        <!-- Status Bar -->
        <div class="status-bar">
          <div class="status-time" id="status-time">09:41</div>
          <div class="status-notch"></div>
          <div class="status-icons">
            <svg class="status-icon" viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.13 19.58 10.53 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/>
            </svg>
            <svg class="status-icon" viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L12 15v5c0 .55.45 1 1 1s1-.45 1-1v-5l4.79-4.79c.13.58.21 1.17.21 1.79 0 4.08-3.05 7.44-7 7.93z"/>
            </svg>
            <div class="battery-icon">
              <div class="battery-level"></div>
            </div>
          </div>
        </div>

        <!-- Camera Viewfinder Card Container -->
        <div class="viewfinder-container">
          <div class="viewfinder" id="viewfinder">
            
            <!-- Video feed -->
            <video id="camera-stream" autoplay playsinline muted></video>
            
            <!-- Animated Fallback Scene (Active when webcam is loading/denied) -->
            <div class="viewfinder-placeholder" id="viewfinder-placeholder">
              <div class="placeholder-scenery">
                <div class="placeholder-sky">
                  <div class="placeholder-sun"></div>
                  <div class="placeholder-cloud c1"></div>
                  <div class="placeholder-cloud c2"></div>
                </div>
                <div class="placeholder-mountains">
                  <div class="mountain m1"></div>
                  <div class="mountain m2"></div>
                </div>
                <div class="placeholder-fields">
                  <div class="field-stripe fs1"></div>
                  <div class="field-stripe fs2"></div>
                  <div class="field-stripe fs3"></div>
                </div>
              </div>
              <div class="placeholder-hint">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                  <circle cx="12" cy="13" r="4"/>
                </svg>
                <span>Simulator Active</span>
              </div>
            </div>

            <!-- Film Grain Overlay -->
            <div class="film-grain"></div>
            
            <!-- Screen Flash Animation Overlay -->
            <div class="flash-overlay" id="flash-overlay"></div>

            <!-- Viewfinder Brackets Overlay (Active when focusing) -->
            <div class="viewfinder-focus-brackets">
              <div class="focus-bracket top-left"></div>
              <div class="focus-bracket top-right"></div>
              <div class="focus-bracket bottom-left"></div>
              <div class="focus-bracket bottom-right"></div>
              <div class="focus-reticle"></div>
            </div>

            <!-- Zoom Control Pill Overlay -->
            <div class="zoom-pill">
              <button class="zoom-btn" data-zoom="0.6">0.6</button>
              <button class="zoom-btn active" data-zoom="1.0">1x</button>
              <button class="zoom-btn" data-zoom="2.0">2x</button>
              <button class="zoom-btn" data-zoom="3.0">3x</button>
            </div>
            
            <!-- Dynamic Retro Date/Time overlay -->
            <div class="viewfinder-date" id="viewfinder-date">28/06/2026</div>

            <!-- Flip Camera Button -->
            <button class="flip-camera-btn" id="btn-flip-camera" aria-label="Switch Camera" style="display: none;">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"></path>
                <path d="M1 20v-6h6"></path>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
              </svg>
            </button>

          </div>
        </div>

        <!-- Sparkles Decoration (Pink Sparks) -->
        <div class="sparkles-decor">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 10L20 14L24 16L20 18L18 22L16 18L12 16L16 14L18 10Z" fill="#FF8A8A" />
            <path d="M30 14L33 22L41 25L33 28L30 36L27 28L19 25L27 22L30 14Z" fill="#FF7B7B" />
            <path d="M22 30L23.5 33L26.5 34L23.5 35L22 38L20.5 35L17.5 34L20.5 33L22 30Z" fill="#FF9E9E" />
          </svg>
        </div>

        <!-- Action Control Buttons Bar -->
        <div class="control-bar">
          
          <!-- Left Button: Film Canister (Gallery) -->
          <button class="action-btn gallery-trigger" id="btn-gallery" aria-label="Open gallery">
            <div class="gallery-badge" id="gallery-badge">1</div>
            <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Canister body -->
              <rect x="12" y="12" width="26" height="38" rx="4" fill="#E2E8F0" stroke="#000000" stroke-width="3.5" />
              <!-- Top Cap and bottom Cap -->
              <ellipse cx="25" cy="12" rx="13" ry="4.5" fill="#4A5568" stroke="#000000" stroke-width="3.5" />
              <ellipse cx="25" cy="50" rx="13" ry="4.5" fill="#4A5568" stroke="#000000" stroke-width="3.5" />
              <rect x="22" y="5" width="6" height="5" fill="#1A202C" stroke="#000000" stroke-width="2.5" />
              <!-- Label colors -->
              <rect x="14" y="19" width="22" height="24" fill="#ED8936" />
              <rect x="14" y="25" width="22" height="12" fill="#FFFFFF" />
              <!-- Film sticking out -->
              <path d="M38 21 H46 C49 21 51 23 51 26 V37 C51 40 49 42 46 42 H38" fill="#1A202C" stroke="#000000" stroke-width="3.5" />
              <!-- Sprocket holes -->
              <rect x="40" y="24" width="3" height="3" rx="0.5" fill="#ED8936" />
              <rect x="45" y="24" width="3" height="3" rx="0.5" fill="#ED8936" />
              <rect x="40" y="36" width="3" height="3" rx="0.5" fill="#ED8936" />
              <rect x="45" y="36" width="3" height="3" rx="0.5" fill="#ED8936" />
            </svg>
          </button>

          <!-- Center Button: Shutter Button -->
          <button class="shutter-btn" id="btn-shutter" aria-label="Take picture">
            <span class="shutter-inner"></span>
          </button>

          <!-- Right Button: Focus Brackets with Purple Sparkle (Filters) -->
          <button class="action-btn filter-trigger" id="btn-filter" aria-label="Toggle filters">
            <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Brackets -->
              <!-- Top Left -->
              <path d="M12 18 V12 H18" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round" />
              <!-- Top Right -->
              <path d="M48 18 V12 H42" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round" />
              <!-- Bottom Left -->
              <path d="M12 42 V48 H18" stroke="#EC4899" stroke-width="4.5" stroke-linecap="round" />
              <!-- Bottom Right -->
              <path d="M48 42 V48 H42" stroke="#EC4899" stroke-width="4.5" stroke-linecap="round" />
              <!-- Sparkle Star in center -->
              <defs>
                <linearGradient id="purple-pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#3B82F6" />
                  <stop offset="50%" stop-color="#8B5CF6" />
                  <stop offset="100%" stop-color="#EC4899" />
                </linearGradient>
              </defs>
              <path d="M30 16L34 26L44 30L34 34L30 44L26 34L16 30L26 26L30 16Z" fill="url(#purple-pink-grad)" />
            </svg>
          </button>

        </div>
        
        <!-- Camera Info & Permission Prompt Overlay -->
        <div class="permission-notice" id="permission-notice">
          <p>Ứng dụng cần quyền truy cập camera để chụp ảnh retro của bạn.</p>
          <button class="btn-allow" id="btn-allow-camera">Cho Phép Camera</button>
          <button class="btn-skip" id="btn-skip-camera">Sử dụng Trình Giả Lập</button>
        </div>

        <!-- DRAWER 1: Retro Filter Drawer -->
        <div class="drawer filter-drawer" id="filter-drawer">
          <div class="drawer-header">
            <h3>Chọn Bộ Lọc Vintage</h3>
            <button class="close-drawer-btn" id="close-filters">&times;</button>
          </div>
          <div class="filter-list">
            <div class="filter-option active" data-filter="normal">
              <div class="filter-preview fp-normal"></div>
              <span>Gốc</span>
            </div>
            <div class="filter-option" data-filter="retro-chrome">
              <div class="filter-preview fp-chrome"></div>
              <span>Retro Chrome</span>
            </div>
            <div class="filter-option" data-filter="lomo-gold">
              <div class="filter-preview fp-lomo"></div>
              <span>Lomo Gold</span>
            </div>
            <div class="filter-option" data-filter="noir-grain">
              <div class="filter-preview fp-noir"></div>
              <span>Noir Grain</span>
            </div>
            <div class="filter-option" data-filter="vhs-glitch">
              <div class="filter-preview fp-vhs"></div>
              <span>VHS Glitch</span>
            </div>
            <div class="filter-option" data-filter="sunset">
              <div class="filter-preview fp-sunset"></div>
              <span>Sunset Glow</span>
            </div>
          </div>
        </div>

        <!-- DRAWER 2: Gallery Drawer (Retro Film Frame Slide Viewer) -->
        <div class="drawer gallery-drawer" id="gallery-drawer">
          <div class="drawer-header">
            <h3>Album Cuộn Phim</h3>
            <button class="close-drawer-btn" id="close-gallery">&times;</button>
          </div>
          
          <div class="gallery-content">
            <!-- Empty state -->
            <div class="gallery-empty" id="gallery-empty">
              <p>Chưa có ảnh nào được chụp.</p>
            </div>
            
            <!-- Slide frame viewer (recreating page 2 of Canva) -->
            <div class="retro-slide-viewer" id="retro-slide-viewer">
              <button class="nav-arrow nav-prev" id="nav-prev" aria-label="Previous image">&lsaquo;</button>
              
              <!-- Retro Slide Frame -->
              <div class="slide-frame-container">
                <div class="slide-mount">
                  <!-- Top text/code on slide mount -->
                  <div class="slide-header-text">KODAK 400 - AI CAM</div>
                  
                  <div class="slide-inner-viewport">
                    <!-- Left Sprockets -->
                    <div class="sprocket-strip left-sprockets">
                      <div class="sprocket-hole"></div>
                      <div class="sprocket-hole"></div>
                      <div class="sprocket-hole"></div>
                      <div class="sprocket-hole"></div>
                      <div class="sprocket-hole"></div>
                    </div>
                    
                    <!-- Main image holder -->
                    <div class="slide-image-wrapper">
                      <img id="current-slide-img" src="/retro-scenery.png" alt="Captured retro landscape">
                      <div class="slide-grain-overlay"></div>
                      <div class="slide-date-stamp" id="slide-date-stamp">28/06/2026</div>
                    </div>
                    
                    <!-- Right Sprockets -->
                    <div class="sprocket-strip right-sprockets">
                      <div class="sprocket-hole"></div>
                      <div class="sprocket-hole"></div>
                      <div class="sprocket-hole"></div>
                      <div class="sprocket-hole"></div>
                      <div class="sprocket-hole"></div>
                    </div>
                  </div>
                  
                  <!-- Bottom text/notes on slide mount -->
                  <div class="slide-footer-text">
                    <span class="slide-filter-label" id="slide-filter-label">Retro Chrome</span>
                    <span class="slide-index" id="slide-index">01 / 01</span>
                  </div>
                </div>

                <!-- Floating Film Canister Decoration overlapping the slide (recreating page 2 layout) -->
                <div class="slide-canister-decor">
                  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="12" y="12" width="26" height="38" rx="4" fill="#D1D5DB" stroke="#1F2937" stroke-width="3" />
                    <ellipse cx="25" cy="12" rx="13" ry="4" fill="#374151" stroke="#1F2937" stroke-width="3" />
                    <ellipse cx="25" cy="50" rx="13" ry="4" fill="#374151" stroke="#1F2937" stroke-width="3" />
                    <rect x="22" y="6" width="6" height="4" fill="#111827" stroke="#1F2937" stroke-width="2" />
                    <rect x="14" y="18" width="22" height="25" fill="#F97316" />
                    <rect x="14" y="24" width="22" height="12" fill="#FFFFFF" />
                    <path d="M38 21 H46 C49 21 51 23 51 26 V37 C51 40 49 42 46 42 H38" fill="#111827" stroke="#1F2937" stroke-width="3" />
                    <rect x="40" y="24" width="3" height="3" rx="0.5" fill="#F97316" />
                    <rect x="45" y="24" width="3" height="3" rx="0.5" fill="#F97316" />
                    <rect x="40" y="36" width="3" height="3" rx="0.5" fill="#F97316" />
                    <rect x="45" y="36" width="3" height="3" rx="0.5" fill="#F97316" />
                  </svg>
                </div>
              </div>
              
              <button class="nav-arrow nav-next" id="nav-next" aria-label="Next image">&rsaquo;</button>
            </div>

            <!-- Slide Actions Menu -->
            <div class="slide-actions">
              <button class="slide-action-btn btn-download" id="btn-download" title="Tải ảnh về máy">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Tải Xuống
              </button>
              
              <button class="slide-action-btn btn-delete" id="btn-delete" title="Xóa ảnh">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                  <line x1="10" y1="11" x2="10" y2="17"/>
                  <line x1="14" y1="11" x2="14" y2="17"/>
                </svg>
                Xóa
              </button>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Hidden canvas for capturing frames with filters -->
  <canvas id="capture-canvas" style="display: none;"></canvas>

  <script type="module" src="/main.js"></script>
</body>
</html>
